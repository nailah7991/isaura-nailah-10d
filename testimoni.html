<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni - Saura Book Store</title>
    <style>
        /* Variabel Warna sesuai foto palet yang kamu kirim */
        :root {
            --dark-navy: #201d39;      
            --velvet-plum: #514575;    
            --misty-violet: #a79dda;   
            --amber-glow: #e58500;     
            --glitter-honey: #ffc451;  
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: var(--dark-navy);
        }

        /* Container agar konten rapi di tengah */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header img {
            width: 100%;
            height: 300px; /* Sesuai permintaan ukuran awalmu */
            object-fit: cover;
            display: block;
        }

        /* Navigasi Aesthetic */
        nav {
            background-color: var(--dark-navy);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        nav a {
            color: var(--misty-violet);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: var(--glitter-honey);
        }

        h1 {
            text-align: center;
            color: var(--velvet-plum);
            margin-top: 40px;
            font-size: 2.5rem;
        }

        /* Styling Formulir */
        .formulir {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin: 30px auto;
            border-top: 8px solid var(--amber-glow);
        }

        .formulir h2 {
            color: var(--velvet-plum);
            margin-bottom: 25px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--velvet-plum);
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--misty-violet);
            background-color: #f9f8ff;
        }

        button {
            background-color: var(--amber-glow);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(229, 133, 0, 0.3);
        }

        button:hover {
            background-color: var(--velvet-plum);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(81, 69, 117, 0.4);
        }

        footer {
            text-align: center;
            padding: 40px 0;
            background-color: var(--dark-navy);
            color: var(--misty-violet);
            margin-top: 60px;
        }
    </style>
</head>
<body>

<header>
    <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1312&h=300&auto=format&fit=crop" alt="Banner Saura Book Store">
</header>

<nav>
    <div class="container">
        <a href="index.html">beranda</a>
        <a href="produk.html">katalog</a>
        <a href="bedahbuku.html">bedah buku</a>
        <a href="testimoni.html" style="color: var(--glitter-honey);">testimoni</a>
        <a href="tampil-testimoni.html">ulasan pembeli</a>
        <a href="kontak.html">kontak</a>
        <a href="event.html">event</a>
    </div>
</nav>

<div class="container">
    <h1>Saura Book Store</h1>

    <main class="formulir">
        <h2>✨ Berikan Testimoni Anda</h2>
        <form id="formtestimoni">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" required placeholder="Contoh: Novita Dian">
            
            <label for="asal">Asal Sekolah / Instansi</label>
            <input type="text" id="asal" required placeholder="Contoh: SMA Negeri 1 Jakarta">

            <label for="judul">Judul Buku yang Dibeli</label>
            <input type="text" id="judul" required placeholder="Masukkan judul novel">

            <label for="rating">Rating (1-5)</label>
            <input type="number" id="rating" min="1" max="5" required placeholder="Berikan nilai 1 sampai 5"> 

            <label for="pesan">Ceritakan Pengalamanmu</label>
            <textarea id="pesan" required placeholder="Tuliskan ulasan jujur kamu..." rows="5"></textarea>

            <label for="email">Alamat Email</label>
            <input type="email" id="email" required placeholder="nama@email.com">

            <button type="submit">Kirim Testimoni Sekarang 🚀</button>
        </form>
    </main>
</div>

<footer>
    <div class="container">
        <p>&copy; 2026 Saura Book Store. Crafting Stories with Heart ❤️</p>
    </div>
</footer>

<script>
    document.getElementById('formtestimoni').addEventListener('submit', function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value;
        const asal = document.getElementById('asal').value;
        const judul = document.getElementById('judul').value;
        const rating = document.getElementById('rating').value;
        const pesan = document.getElementById('pesan').value;
        const email = document.getElementById('email').value;
        
        const dataBaru = { nama, asal, judul, rating, pesan, email };

        let testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];
        testimoniList.push(dataBaru);
        localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

        // Beri alert kecil agar user tahu data terkirim
        alert('Terima kasih! Testimoni kamu sudah tersimpan.');
        window.location.href = 'tampil-testimoni.html'; 
    });
</script>

</body>
</html>
