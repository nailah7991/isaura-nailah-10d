<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saura Book Store</title>
    <style>
        /* Mengatur warna dasar berdasarkan gambar palet */
        :root {
            --velvet-plum: #514575;
            --misty-violet: #a79dda;
            --amber-glow: #e58500;
            --glitter-honey: #ffc451;
            --dark-navy: #201d39; /* Warna paling gelap dari palet */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: var(--dark-navy);
            line-height: 1.6;
        }

        /* Container untuk merapikan konten agar di tengah */
        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header & Navigasi */
        .header {
            background-color: var(--dark-navy);
            color: white;
            padding: 1.5rem 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .nav-block {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--glitter-honey); /* Menggunakan warna Glitter Honey */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a {
            color: var(--misty-violet);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--ffc451); /* Warna berubah saat kursor di atasnya */
        }

        /* Bagian Utama (Main) */
        main {
            padding: 50px 0;
            min-height: 60vh;
            text-align: center;
        }

        .konfirmasi {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-top: 5px solid var(--amber-glow);
        }

        h1 {
            color: var(--velvet-plum);
            margin-bottom: 20px;
        }

        .btn-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: var(--amber-glow);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-link:hover {
            background-color: var(--velvet-plum);
        }

        /* Footer */
        footer {
            background-color: var(--dark-navy);
            color: var(--misty-violet);
            text-align: center;
            padding: 20px 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="nav-block">
            <div class="logo">Saura Book Store</div>
            <nav>
                <a href="index.html">Beranda</a>
                <a href="produk.html">Produk</a>
                <a href="bedahbuku.html">Bedah Buku</a>
                <a href="testimoni.html">Testimoni</a>
                <a href="tampil-testimoni.html">Ulasan</a>
                <a href="kontak.html">Kontak</a>
                <a href="event.html">Event</a>
            </nav>
        </div>
    </div>
</header>

<main class="container">
    <section class="konfirmasi">
        <h1>Terima Kasih! ✨</h1>
        <p>Testimoni anda telah berhasil dikirim dan sangat berarti bagi kami.</p>
        <a href="tampil-testimoni.html" class="btn-link">Lihat semua testimoni &rarr;</a>
    </section>
</main>

<footer>
    <div class="container">
        <p>&copy; 2026 Toko Buku Saura Book Store.  Crafting Stories with Heart ❤️</p>
    </div>
</footer>

</body>
</html>
